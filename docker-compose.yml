services:
  postgres:
    image: postgres:16-alpine
    container_name: supportops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supportops}
      POSTGRES_USER: ${POSTGRES_USER:-supportops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supportops}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supportops} -d ${POSTGRES_DB:-supportops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: supportops-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: supportops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: supportops-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
